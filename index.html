
<h2 class="sr-only">Dashboard Analitik PnL Toko 2026 - Rekomendasi Tutup & Relokasi</h2>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{padding:1rem 0}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.mc{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px}
.mc-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.mc-val{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.mc-sub{font-size:11px;color:var(--color-text-tertiary);margin-top:2px}
.section-title{font-size:14px;font-weight:500;color:var(--color-text-primary);margin:1.2rem 0 0.6rem}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.filters select,.filters input{font-size:12px;padding:4px 8px;height:30px}
.filters label{font-size:12px;color:var(--color-text-secondary)}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
th{text-align:left;padding:6px 8px;font-weight:500;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);font-size:11px;background:var(--color-background-secondary)}
td{padding:6px 8px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover td{background:var(--color-background-secondary)}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;white-space:nowrap}
.b-high{background:#FCEBEB;color:#A32D2D}
.b-mhigh{background:#FAEEDA;color:#854F0B}
.b-med{background:#FAC775;color:#633806;opacity:.85}
.b-low{background:#E1F5EE;color:#0F6E56}
.b-ok{background:#EAF3DE;color:#3B6D11}
.b-rel{background:#E6F1FB;color:#185FA5}
.neg{color:#A32D2D}
.pos{color:#3B6D11}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:1rem}
.chart-box{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px}
.chart-title{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:10px}
.tab-bar{display:flex;gap:0;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:1rem}
.tab{font-size:12px;padding:6px 14px;cursor:pointer;color:var(--color-text-secondary);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:var(--color-text-primary);border-bottom:2px solid var(--color-text-primary);font-weight:500}
.pager{display:flex;gap:6px;align-items:center;margin-top:8px;font-size:12px;color:var(--color-text-secondary);justify-content:flex-end}
.pager button{font-size:11px;padding:2px 8px}
</style>

<div class="wrap">

<div class="metrics" id="metrics"></div>

<div class="chart-row">
  <div class="chart-box">
    <div class="chart-title">Distribusi kategori toko</div>
    <div style="position:relative;height:180px"><canvas id="catChart" role="img" aria-label="Distribusi kategori risiko toko"></canvas></div>
  </div>
  <div class="chart-box">
    <div class="chart-title">PnL per bulan (Jan–Apr 2026) — toko bermasalah</div>
    <div style="position:relative;height:180px"><canvas id="monthChart" role="img" aria-label="PnL bulanan toko bermasalah"></canvas></div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab active" onclick="setTab('all')">Semua toko</button>
  <button class="tab" onclick="setTab('risk')">⚠ High & Medium-High Risk</button>
  <button class="tab" onclick="setTab('relokasi')">🔄 Sudah ditandai relokasi</button>
</div>

<div class="filters">
  <label>Filter provinsi:</label>
  <select id="provFilter" onchange="render()"><option value="">Semua</option></select>
  <label style="margin-left:8px">Cari toko:</label>
  <input id="search" type="text" placeholder="nama / kota..." oninput="render()" style="width:160px">
  <label style="margin-left:8px">Sort:</label>
  <select id="sortBy" onchange="render()">
    <option value="total_pnl">Total PnL</option>
    <option value="neg_months">Bulan negatif</option>
    <option value="avg_monthly_pnl">Rata-rata bulanan</option>
    <option value="kategori">Kategori</option>
  </select>
</div>

<div style="overflow-x:auto">
<table>
  <thead>
    <tr>
      <th style="width:130px">Toko</th>
      <th style="width:110px">Kota</th>
      <th style="width:90px">Provinsi</th>
      <th style="width:72px;text-align:right">PnL Jan</th>
      <th style="width:72px;text-align:right">PnL Feb</th>
      <th style="width:72px;text-align:right">PnL Mar</th>
      <th style="width:72px;text-align:right">PnL Apr</th>
      <th style="width:80px;text-align:right">Total PnL</th>
      <th style="width:50px;text-align:center">Bln Neg</th>
      <th style="width:90px;text-align:center">Status</th>
      <th style="width:60px;text-align:center">Relokasi</th>
    </tr>
  </thead>
  <tbody id="tbl"></tbody>
</table>
</div>
<div class="pager">
  <span id="pageInfo"></span>
  <button onclick="changePage(-1)">←</button>
  <button onclick="changePage(1)">→</button>
</div>

</div>

const fmt=(v)=>v==null?'-':(v<0?'-Rp '+Math.abs(Math.round(v/1e6))+'M':'Rp '+Math.round(v/1e6)+'M');
const katOrder={'HIGH RISK':0,'MEDIUM-HIGH RISK':1,'MEDIUM RISK':2,'LOW RISK':3,'BAIK':4};
const katBadge={'HIGH RISK':'b-high','MEDIUM-HIGH RISK':'b-mhigh','MEDIUM RISK':'b-med','LOW RISK':'b-low','BAIK':'b-ok'};
let currentTab='all', page=0, PAGE=15;

const provinces=[...new Set(RAW.map(r=>r.province).filter(Boolean))].sort();
const provSel=document.getElementById('provFilter');
provinces.forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;provSel.appendChild(o);});

function getFiltered(){
  const prov=provSel.value;
  const q=(document.getElementById('search').value||'').toLowerCase();
  const sort=document.getElementById('sortBy').value;
  let data=[...RAW];
  if(currentTab==='risk') data=data.filter(r=>r.kategori==='HIGH RISK'||r.kategori==='MEDIUM-HIGH RISK');
  if(currentTab==='relokasi') data=data.filter(r=>r.relocate==='Relocate');
  if(prov) data=data.filter(r=>r.province===prov);
  if(q) data=data.filter(r=>(r.name||'').toLowerCase().includes(q)||(r.city||'').toLowerCase().includes(q));
  data.sort((a,b)=>{
    if(sort==='total_pnl') return (a.total_pnl||0)-(b.total_pnl||0);
    if(sort==='neg_months') return (b.neg_months||0)-(a.neg_months||0);
    if(sort==='avg_monthly_pnl') return (a.avg_monthly_pnl||0)-(b.avg_monthly_pnl||0);
    if(sort==='kategori') return (katOrder[a.kategori]||4)-(katOrder[b.kategori]||4);
    return 0;
  });
  return data;
}

function render(){
  const data=getFiltered();
  const total=data.length;
  const maxPage=Math.ceil(total/PAGE);
  if(page>=maxPage) page=Math.max(0,maxPage-1);
  const slice=data.slice(page*PAGE,(page+1)*PAGE);
  const tbody=document.getElementById('tbl');
  tbody.innerHTML=slice.map(r=>`<tr>
    <td title="${r.name}">${r.name}</td>
    <td>${r.city}</td>
    <td>${r.province}</td>
    <td style="text-align:right" class="${r.pnl_Jan<0?'neg':'pos'}">${fmt(r.pnl_Jan)}</td>
    <td style="text-align:right" class="${r.pnl_Feb<0?'neg':'pos'}">${fmt(r.pnl_Feb)}</td>
    <td style="text-align:right" class="${r.pnl_Mar<0?'neg':'pos'}">${fmt(r.pnl_Mar)}</td>
    <td style="text-align:right" class="${r.pnl_Apr<0?'neg':'pos'}">${fmt(r.pnl_Apr)}</td>
    <td style="text-align:right;font-weight:500" class="${(r.total_pnl||0)<0?'neg':'pos'}">${fmt(r.total_pnl)}</td>
    <td style="text-align:center;font-weight:500;color:${r.neg_months>=3?'#A32D2D':r.neg_months>=1?'#854F0B':'#3B6D11'}">${r.neg_months}</td>
    <td style="text-align:center"><span class="badge ${katBadge[r.kategori]||'b-ok'}">${r.kategori}</span></td>
    <td style="text-align:center">${r.relocate?'<span class="badge b-rel">Relocate</span>':''}</td>
  </tr>`).join('');
  document.getElementById('pageInfo').textContent=`${page*PAGE+1}–${Math.min((page+1)*PAGE,total)} dari ${total}`;
}

function setTab(t){
  currentTab=t;page=0;
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  event.target.classList.add('active');
  render();
}
function changePage(d){
  const data=getFiltered();
  const maxPage=Math.ceil(data.length/PAGE);
  page=Math.max(0,Math.min(page+d,maxPage-1));
  render();
}

const catCount={};
RAW.forEach(r=>{catCount[r.kategori]=(catCount[r.kategori]||0)+1});
const catLabels=['HIGH RISK','MEDIUM-HIGH RISK','MEDIUM RISK','LOW RISK','BAIK'];
const catColors=['#E24B4A','#EF9F27','#FAC775','#1D9E75','#639922'];

new Chart(document.getElementById('catChart'),{
  type:'doughnut',
  data:{labels:catLabels,datasets:[{data:catLabels.map(c=>catCount[c]||0),backgroundColor:catColors,borderWidth:0}]},
  options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.parsed} toko`}}}}
});
const legDiv=document.createElement('div');
legDiv.style='display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;font-size:11px';
legDiv.innerHTML=catLabels.map((l,i)=>`<span style="display:flex;align-items:center;gap:3px"><span style="width:9px;height:9px;border-radius:2px;background:${catColors[i]};display:inline-block"></span>${l}: ${catCount[l]||0}</span>`).join('');
document.getElementById('catChart').parentElement.parentElement.appendChild(legDiv);

const highRisk=RAW.filter(r=>r.kategori==='HIGH RISK'||r.kategori==='MEDIUM-HIGH RISK').slice(0,8);
new Chart(document.getElementById('monthChart'),{
  type:'bar',
  data:{
    labels:highRisk.map(r=>r.name.length>12?r.name.slice(0,11)+'…':r.name),
    datasets:[
      {label:'Jan',data:highRisk.map(r=>(r.pnl_Jan||0)/1e6),backgroundColor:'#B5D4F4'},
      {label:'Feb',data:highRisk.map(r=>(r.pnl_Feb||0)/1e6),backgroundColor:'#378ADD'},
      {label:'Mar',data:highRisk.map(r=>(r.pnl_Mar||0)/1e6),backgroundColor:'#185FA5'},
      {label:'Apr',data:highRisk.map(r=>(r.pnl_Apr||0)/1e6),backgroundColor:'#0C447C'},
    ]
  },
  options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top',labels:{boxWidth:10,font:{size:10}}}},scales:{x:{ticks:{font:{size:9},maxRotation:35}},y:{ticks:{callback:v=>'Rp '+v+'M'},grid:{color:'rgba(0,0,0,0.05)'}}}}
});

const metrics=document.getElementById('metrics');
const totalStores=RAW.length;
const highN=RAW.filter(r=>r.kategori==='HIGH RISK').length;
const mhN=RAW.filter(r=>r.kategori==='MEDIUM-HIGH RISK').length;
const relN=RAW.filter(r=>r.relocate==='Relocate').length;
const negTotal=RAW.filter(r=>(r.total_pnl||0)<0).length;
metrics.innerHTML=`
<div class="mc"><div class="mc-label">Total toko aktif</div><div class="mc-val">${totalStores}</div><div class="mc-sub">Jan–Apr 2026</div></div>
<div class="mc"><div class="mc-label" style="color:var(--color-text-danger)">High Risk</div><div class="mc-val" style="color:#A32D2D">${highN}</div><div class="mc-sub">Prioritas tutup/relokasi</div></div>
<div class="mc"><div class="mc-label">PnL Negatif (total)</div><div class="mc-val" style="color:#854F0B">${negTotal}</div><div class="mc-sub">Toko dengan total PnL < 0</div></div>
<div class="mc"><div class="mc-label">Sudah ditandai relokasi</div><div class="mc-val" style="color:#185FA5">${relN}</div><div class="mc-sub">Dari tim sebelumnya</div></div>`;

render();
</script>
